# Security Policy

## Supported Versions

| Version | Supported |
|---------|-----------|
| 1.x     | ✅ Yes    |

---

## Reporting a Vulnerability

**Please do NOT open a public GitHub issue for security vulnerabilities.**

This tool handles RSC service account credentials and CDM cluster credentials, and produces detailed assessment reports of your Rubrik estate — including cluster names, node IP addresses, version strings, storage capacity, SLA policies, workload inventory, and replication topology. Responsible disclosure is important.

### How to Report

Use **GitHub's private vulnerability reporting**:

1. Go to the [Security tab](../../security) of this repository
2. Click **"Report a vulnerability"**
3. Fill in the details — include steps to reproduce, impact assessment, and any suggested remediation if you have one

We aim to acknowledge reports within **3 business days** and provide a fix or mitigation within **14 days** for high/critical issues.

### What to Include

- A description of the vulnerability and its potential impact
- Steps to reproduce (proof-of-concept code if applicable)
- The version(s) affected
- Any suggested fix

### Out of Scope

- Vulnerabilities in Rubrik Security Cloud (RSC) itself — report those directly to Rubrik
- Vulnerabilities in CDM software — report those directly to Rubrik
- Denial-of-service against the local Python process
- Issues that require physical access to the machine running the assessment
- Rate-limit overages caused by misconfigured parallelism settings
- Assessment inaccuracies caused by stale `cdm_eos_data.json` or `compatibility_matrix.py` data

