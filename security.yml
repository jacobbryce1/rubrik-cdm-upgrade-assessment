## Threat Model

This tool is designed for **single-operator or small-team use on a trusted host** — an Advisory SE or infrastructure engineer running the assessment on a local workstation or a secure jump host with network access to both RSC and CDM node IPs. The threat model assumes:

- **The host is trusted.** The tool does not defend against a compromised OS or a malicious local user with access to the working directory, `.env` file, or output files. OS-level user separation and filesystem permissions (`chmod 0700`/`0600`) are the primary controls for data at rest.
- **The RSC instance is trusted.** The tool validates `RSC_BASE_URL` format at startup but does not defend against a compromised RSC instance returning malicious cluster data. HTML report generation treats all field values as untrusted strings — they are written through an escaping layer — but downstream consumers of CSV and JSON output should treat all field values as untrusted data in any further processing.
- **The network path to RSC is trusted.** TLS verification is enforced and cannot be disabled for RSC calls, but the tool does not implement certificate pinning. A compromised CA in the system trust store could perform MITM undetected.
- **The network path to CDM nodes may use internal CAs.** `CDM_CA_BUNDLE` supports custom CA bundles for this case. `CDM_CA_BUNDLE=false` is explicitly out of scope for production threat modelling — it should only be used in air-gapped lab environments where the network is fully controlled.
- **The `.env` file is protected by the OS.** `SecretStr` wrapping and `.gitignore` are code-level controls that reduce accidental exposure — they do not replace OS file permissions or secrets management. For production or team deployments, consider a secrets manager (HashiCorp Vault, AWS Secrets Manager, Azure Key Vault) rather than a `.env` file.
- **Assessment output is point-in-time.** Reports reflect cluster state at the time of the run. The integrity manifest detects post-run tampering but does not prevent a stale report from being used to justify an upgrade decision. Always re-run the assessment close to the planned upgrade window.

