## Files Generated at Runtime

| File | Contents | Protected by |
|------|----------|--------------|
| `.env` | RSC credentials, target version | `.gitignore`, OS file permissions |
| `output/` | Assessment reports (all formats) | `.gitignore`, `chmod 0700` / `0600` |
| `output/manifest.sha256` | SHA-256 hashes of all output files | `chmod 0600` |
| `logs/` | Rotating debug log files | `.gitignore`, `chmod 0700` |

> The `output/` directory contains cluster names, node IPs, version strings, SLA policies, workload inventory, and replication topology. The `logs/` directory may contain API response structures and cluster metadata at `DEBUG` log level. Both must be treated as sensitive infrastructure data and must not be stored on shared or world-readable filesystems.

