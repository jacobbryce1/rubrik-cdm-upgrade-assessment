## Security Design

### Credential Handling

- All credentials (`RSC_CLIENT_ID`, `RSC_CLIENT_SECRET`, `RSC_BASE_URL`, `RSC_ACCESS_TOKEN_URI`) are loaded exclusively from environment variables or a `.env` file — never hardcoded in source.
- Credentials are immediately wrapped in a `SecretStr` type on load in `config.py`. `SecretStr` values never appear in `repr()`, `str()`, log output, or exception tracebacks — they render as `**********` in any context that would otherwise expose them.
- `RSC_CLIENT_SECRET.get_secret_value()` is called only at the exact point of HTTP transmission in `rsc_client.py`. The wrapped object is passed through all other layers — thread pools, collector modules, enrichment functions — without ever unwrapping it.
- CDM direct API credentials are obtained per-cluster via the RSC API and are also wrapped as `SecretStr` for their lifetime. They are never written to disk, logged, or included in report output.
- Use a **dedicated read-only service account** scoped to `ViewCluster`, `ViewSLA`, and `ViewInventory`. Rotate the secret after each assessment run to limit blast radius if the `.env` file is ever exposed.

### Token Lifecycle

- RSC token acquisition and refresh are handled in `rsc_client.py`. The active token is stored as a `SecretStr` and never logged or surfaced in output.
- Tokens are proactively refreshed `TOKEN_REFRESH_BUFFER_SEC` seconds before expiry (default: 300 seconds), preventing mid-run failures on long multi-cluster assessments.
- Token refresh is thread-safe — a single lock prevents concurrent collector threads from triggering redundant refresh calls under parallel execution.
- On receipt of a 401 or 403 response, the token is force-refreshed and the request retried before surfacing an error.
- SSL errors during authentication are never retried — they raise immediately with a clear message, preventing silent MITM exposure.

### Network Security — RSC API

- TLS certificate verification is explicitly enforced on all RSC API calls in `rsc_client.py`. There is no mechanism to disable this for RSC communication.
- `SSLError` on RSC calls is caught and raised as a fatal error — it is never absorbed by the generic retry loop and never silently bypassed.
- All RSC API communication is HTTPS only. There is no HTTP fallback.
- `urllib3.disable_warnings()` has been removed entirely — TLS warnings are never globally suppressed anywhere in the codebase.

### Network Security — CDM Direct API

- CDM direct API calls default to `CDM_CA_BUNDLE=true` (system CAs). This is the only safe default for production use.
- A custom CA bundle path (`CDM_CA_BUNDLE=/path/to/bundle.pem`) is supported for environments where CDM clusters use internally-signed certificates.
- `CDM_CA_BUNDLE=false` disables TLS verification for CDM direct calls. This setting is provided for isolated lab environments only. When set, a warning is emitted on every API call — it cannot be silenced. Do not use this setting in any environment where the network path to CDM nodes is untrusted.
- `MAX_CDM_AUTH_ATTEMPTS` limits the number of node IPs tried per cluster during CDM authentication, preventing credential spray across large node pools on transient failures.

### Output File Security

- The `output/` and `logs/` directories are created with `chmod 0700` (owner-only access) before any files are written.
- Each output file — JSON report, CSV, HTML dashboard, JSONL stream files, and the integrity manifest — is created with `chmod 0600` (owner read/write only) at the file descriptor level using `os.open()` with `O_CREAT`, before any data is written. This closes the race window that would exist with a post-write `chmod`.
- Output files contain sensitive infrastructure data: cluster names, node IP addresses, CDM version strings, SLA policies, storage capacity figures, workload inventory, replication topology, and detailed upgrade blocker information. Treat them with the same sensitivity as network diagrams or infrastructure inventories.
- The `logs/` directory contains full debug output including API response structures, cluster metadata, and collector timing. Treat log files with the same sensitivity as report output.

### SHA-256 Integrity Manifest

- A `manifest.sha256` file is written at the end of every assessment run, containing SHA-256 hashes of all output files.
- The manifest allows downstream consumers — change management processes, audit teams, or automated tooling — to verify that report files have not been modified after the assessment completed.
- Verify before making upgrade decisions:

```bash
cd output/assessment_YYYYMMDD_HHMMSS/
sha256sum -c manifest.sha256
```

- Any file reporting other than `OK` indicates post-assessment modification. Do not act on a result set that fails integrity verification.

### Credential Leak Prevention

- `.gitignore` excludes `.env`, `output/`, and `logs/` from version control.
- `setup.sh` offers to install a `detect-secrets` pre-commit hook on supported systems, which scans staged files for credential patterns before they reach Git history.
- A GitHub Actions workflow (`.github/workflows/security.yml`) runs `gitleaks` across the full commit history on every push and pull request, detecting any credentials that may have been accidentally committed.

### Error Handling and Information Leakage

- Raw API response bodies are never written to stdout. The logging layer in `rsc_client.py` captures structured fields only — status codes and message strings bounded in length — not full response payloads.
- Exception strings from `requests` (which may contain full URLs, headers, or partial response bodies) are never propagated to user-visible console output or report content.
- Per-collector error isolation in `main.py` ensures that a failure in one collector (e.g., `cdm_live_mounts`) does not surface internal stack traces in the HTML report. The cluster is marked `PARTIAL` and the specific collector failure is recorded in the log file only.
- The `run_id` embedded in every log line and log filename allows cross-thread correlation in parallel runs without exposing cluster credentials or API tokens in the log stream.

### Dependency Management

- All dependencies are pinned to exact versions in `requirements.txt`, preventing silent supply-chain upgrades to vulnerable versions.
- A GitHub Actions workflow runs `pip-audit` automatically on every push to detect known CVEs in pinned dependencies.
- Run a local audit at any time:

```bash
pip install pip-audit
pip-audit -r requirements.txt
```

